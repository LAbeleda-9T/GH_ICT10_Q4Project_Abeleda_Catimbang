<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- PyScript -->
    <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
    <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>

    <!-- BOOTSTRAP 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
 

    <title>Attendance Tracker</title>

    <py-config>
        packages = ["numpy", "matplotlib"]
    </py-config>

<style>
body {
    margin: 0;
    font-family: Poppins, sans-serif;
    background: #EEEEEE;
}

/* NAVBAR */
.navbar {
    background-color: #525252;
    padding: 12px 0;
}

.navbar-brand {
    color: #E1E1E0 
    font-weight: 600;
}

.nav-link {
    color: #E1E1E0 
    white-space: nowrap;
    transition: 0.3s;
}

.nav-link:hover {
    color: #617073 
}


.main-container {
    max-width: 700px;
    margin: 50px auto;
    padding: 30px;
    background: white;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}


input, select {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 10px;
    border: 1px solid #B3C0A4;
    outline: none;
    transition: 0.2s;
}

input:focus, select:focus {
    border-color: #DCC48E;
    box-shadow: 0 0 5px rgba(220,196,142,0.4);
}


button, input[type="button"] {
    width: 49%;
    padding: 10px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    background: #505168;
    color: white;
    cursor: pointer;
    transition: 0.2s;
}

button:hover, input[type="button"]:hover {
    background: #27233A;
}

.list {
    background: #f9f9f9;
    padding: 15px;
    margin-top: 20px;
    border-radius: 10px;
}
</style>


</head>

<body>
<!-- navbar -->
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="#">Classmates '26</a>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Classmates</a></li>
                <li class="nav-item"><a class="nav-link" href="index(st).html">Attendance</a></li>
                <li class="nav-item"><a class="nav-link" href="index(g).html">Gallery</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="main-container mt-3">
    <h2>Attendance Tracker</h2>

    <label>Select Day:</label>
    <select id="day">
        <option value="Monday">Monday</option>
        <option value="Tuesday">Tuesday</option>
        <option value="Wednesday">Wednesday</option>
        <option value="Thursday">Thursday</option>
        <option value="Friday">Friday</option>
    </select>

    <br><br>

    <label>Absences:</label>
    <input type="number" id="absences">

    <br><br>

    <button py-click="add_data">Submit</button>
    <button py-click="show_graph">Show Graph</button>

    <div id="output"></div>

    <div id="graph-container"></div>

    <py-script src="main(st).py"></py-script>
</div>

</body>
</html>
